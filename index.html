/* ---------------------------- wiring ------------------------------ */
function dispatchImport(text) {
  if (state.category === 'books') {
    const books = booksFromCSV(text);
    if (!books.length) { importError('Couldn’t find any books — need a Goodreads CSV with a Title column.'); return; }
    importItems('books', books);
  } else {
    ingestTitles(state.category, text);
  }
}
function loadSample() {
  const cat = state.category;
  if (cat === 'books') importItems('books', sampleBooks());
  else ingestTitles(cat, cat === 'movies' ? SAMPLE_MOVIES : SAMPLE_TV);
}
function wireAll() {
  document.querySelectorAll('[data-cat]').forEach(b => b.onclick = () => { state.category = b.getAttribute('data-cat'); state.addOpen = false; render(); });
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { state.tab = b.getAttribute('data-tab'); render(); });
  document.querySelectorAll('[data-act="pick"]').forEach(b => b.onclick = () => choose(b.getAttribute('data-side')));
  document.querySelectorAll('[data-sent]').forEach(b => b.onclick = () => rateSentiment(b.getAttribute('data-sent')));
  document.querySelectorAll('[data-act="skip"]').forEach(b => b.onclick = skip);
  document.querySelectorAll('[data-act="reset"]').forEach(b => b.onclick = resetCurrent);
  document.querySelectorAll('[data-act="reset-rankings"]').forEach(b => b.onclick = resetRankings);
  document.querySelectorAll('[data-act="go-add"]').forEach(b => b.onclick = () => { state.tab = 'library'; state.addOpen = true; render(); const f = document.getElementById('add-title') || document.getElementById('live-search'); if (f && f.focus) try { f.focus(); } catch (_) {} });
  document.querySelectorAll('[data-act="export-file"]').forEach(b => b.onclick = exportBackup);
  document.querySelectorAll('[data-act="export-site"]').forEach(b => b.onclick = () => { exportSiteData(); const m = document.getElementById('backup-msg'); if (m) m.textContent = 'Downloaded data.json — now upload it into your GitHub repo next to index.html.'; });
  document.querySelectorAll('[data-act="import-file"]').forEach(b => b.onclick = () => { const f = document.getElementById('restore-file'); if (f) f.click(); });
  const restoreFile = document.getElementById('restore-file');
  if (restoreFile) restoreFile.onchange = () => {
    const file = restoreFile.files && restoreFile.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { const okg = importBackupText(String(reader.result || '')); if (!okg) { const m = document.getElementById('backup-msg'); if (m) m.textContent = 'That file didn’t look like a Shelf Rank backup.'; } };
    reader.readAsText(file);
  };
  document.querySelectorAll('[data-act="copy-code"]').forEach(b => b.onclick = () => {
    const ta = document.getElementById('sync-code'); if (!ta) return;
    const done = () => { const m = document.getElementById('backup-msg'); if (m) m.textContent = 'Code copied — paste it on your other device.'; };
    try { navigator.clipboard.writeText(ta.value).then(done, () => { ta.select(); document.execCommand && document.execCommand('copy'); done(); }); }
    catch (_) { ta.select(); try { document.execCommand('copy'); } catch (e) {} done(); }
  });
  document.querySelectorAll('[data-act="restore-code"]').forEach(b => b.onclick = () => {
    const ta = document.getElementById('sync-code');
    const okg = ta && importBackupText(ta.value);
    if (!okg) { const m = document.getElementById('backup-msg'); if (m) m.textContent = 'That code didn’t work — make sure you pasted the whole thing.'; }
  });
  document.querySelectorAll('[data-rerank]').forEach(el => el.onclick = () => rerankById(el.getAttribute('data-rerank')));
  document.querySelectorAll('[data-ttcover]').forEach(cell => {
    const it = cur().master.find(b => b.id === cell.getAttribute('data-ttcover'));
    if (it) mountThumb(cell, it);
  });
  document.querySelectorAll('[data-setting="calibrations"]').forEach(s => s.onchange = () => { state.calibrations = Math.max(1, parseInt(s.value, 10) || 5); save(); render(); });
  document.querySelectorAll('[data-act="reset-all"]').forEach(b => b.onclick = resetAll);
  document.querySelectorAll('[data-filter]').forEach(s => s.onchange = () => { const L = cur(); if (s.getAttribute('data-filter') === 'genre') L.filterGenre = s.value; else L.filterAuthor = s.value; render(); });
  document.querySelectorAll('[data-act="clearfilter"]').forEach(b => b.onclick = () => { const L = cur(); L.filterGenre = 'all'; L.filterAuthor = 'all'; L.search = ''; L.segments = []; L.segOpen = false; render(); });
  document.querySelectorAll('[data-act="add-open"]').forEach(b => b.onclick = openAdd);
  document.querySelectorAll('[data-act="add-cancel"]').forEach(b => b.onclick = closeAdd);
  document.querySelectorAll('[data-act="add-book"]').forEach(b => b.onclick = submitManualItem);
  document.querySelectorAll('.addform .field').forEach(f => f.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitManualItem(); } }));
  const input = el('csv-input');
  if (input) input.onchange = e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => dispatchImport(String(rd.result || ''));
    rd.onerror = () => importError('Couldn’t read that file — paste the text instead.');
    rd.readAsText(f);
  };
  document.querySelectorAll('[data-act="submit-text"]').forEach(b => b.onclick = () => {
    const box = el('paste-box'); const t = box ? box.value.trim() : '';
    if (!t) { importError(state.category === 'books' ? 'Paste your CSV text first.' : 'Paste at least one title first.'); return; }
    dispatchImport(t);
  });
  document.querySelectorAll('[data-act="sample"]').forEach(b => b.onclick = loadSample);

  // live search (movies/tv)
  const ls = el('live-search');
  if (ls) {
    ls.oninput = () => {
      clearTimeout(searchTimer);
      const q = ls.value.trim();
      const drop = el('live-drop');
      if (q.length < 2) { searchSeq++; if (drop) { drop.innerHTML = ''; drop.classList.remove('open'); } return; }
      searchTimer = setTimeout(() => runLiveSearch(q), 300); // debounce
    };
    ls.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); const first = document.querySelector('#live-drop .sug'); if (first) first.click(); } };
    ls.onblur = () => { setTimeout(() => { const d = el('live-drop'); if (d) d.classList.remove('open'); }, 160); };
    ls.onfocus = () => { const d = el('live-drop'); if (d && d.children.length) d.classList.add('open'); };
  }

  // recommendations carousel
  document.querySelectorAll('[data-recadd]').forEach(btn => btn.onclick = () => addRecommendation(+btn.getAttribute('data-recadd'), btn));
  document.querySelectorAll('[data-reccover]').forEach(cell => {
    const e = lastRecs[+cell.getAttribute('data-reccover')];
    if (e) mountRecCover(cell, e, state.category);
  });

  // leaderboard real-time search (re-render + refocus, cursor to end)
  const lbs = el('lb-search');
  if (lbs) {
    lbs.oninput = () => {
      cur().search = lbs.value;
      render();
      const n = el('lb-search');
      if (n) { n.focus(); const v = n.value; try { n.setSelectionRange(v.length, v.length); } catch (_) {} }
    };
  }
  // segment multi-select dropdown
  document.querySelectorAll('[data-act="segtoggle"]').forEach(b => b.onclick = () => { const L = cur(); L.segOpen = !L.segOpen; render(); });
  document.querySelectorAll('[data-seg]').forEach(b => b.onclick = () => {
    const L = cur(); const k = b.getAttribute('data-seg');
    if (k === 'all') { L.segments = []; }
    else { L.segments = L.segments.includes(k) ? L.segments.filter(s => s !== k) : [...L.segments, k]; }
    render();
  });

  // undo last vote
  document.querySelectorAll('[data-act="undo"]').forEach(b => b.onclick = undoLastVote);
}
