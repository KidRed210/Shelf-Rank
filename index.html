<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f4f1ea" />
<link id="mani" rel="manifest" />
<link id="fav" rel="icon" type="image/svg+xml" />
<link id="atouch" rel="apple-touch-icon" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Shelf Rank" />
<title>Shelf Rank</title>
<style>
/* ============================================================ *
 *  Shelf Rank — Goodreads-inspired warm-paper light theme.
 *  Self-contained. No CDN, no web fonts.
 * ============================================================ */
:root{
  color-scheme: light;
  --bg:#f4f1ea;
  --surface:#ffffff;
  --surface-2:#f3eee3;
  --border:#dcd6c6;
  --border-soft:#e8e2d4;
  --text:#382110;
  --muted:#6b5b4a;
  --faint:#8a7a68;
  --dim:#b3a794;
  --crimson:#8a5a2b;      /* accent brown (legacy var names kept) */
  --crimson-600:#6b4423;
  --crimson-700:#4b2e12;
  --crimson-300:#6f4a22;  /* accent text — dark enough for cream */
  --crimson-400:#8a5a2b;  /* accent icons / numbers */
  --gold:#c8892b;
  --paper:#efe7d5;
  --brick:#a3402f;
  --r:14px;
  --r-lg:22px;
  --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;}
body{
  font-family:var(--sans);color:var(--text);background-color:var(--bg);
  background-image:
    radial-gradient(120% 80% at 50% -10%, rgba(200,137,43,.12), transparent 60%),
    radial-gradient(80% 60% at 90% 110%, rgba(138,90,43,.07), transparent 60%);
  background-attachment:fixed;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
img{display:block;}

/* layout */
.wrap{max-width:448px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;transition:max-width .18s ease;}
.wrap.wide{max-width:min(1120px,96vw);}
.wrap.wide .header2{max-width:512px;margin:0 auto;width:100%;box-sizing:border-box;}
.wrap.wide .fade{max-width:1040px;margin-left:auto;margin-right:auto;}
.lb-name{font-family:var(--serif);font-size:15px;line-height:1.25;margin:0;font-weight:600;overflow-wrap:break-word;word-break:break-word;}
.main{flex:1;overflow-y:auto;padding:8px 16px 116px;-ms-overflow-style:none;scrollbar-width:none;}
.main::-webkit-scrollbar{display:none;}
.fade{animation:fade .35s ease both;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.serif{font-family:var(--serif);}
.clamp1,.clamp2,.clamp3{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}
.clamp1{-webkit-line-clamp:1;}.clamp2{-webkit-line-clamp:2;}.clamp3{-webkit-line-clamp:3;}
.num{font-variant-numeric:tabular-nums;}

/* header + category bar */
.header2{padding:18px 16px 10px;}
.hrow{display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:-.01em;line-height:1;margin:0;}
.brand b{color:var(--crimson);font-weight:600;}
.hcount{font-size:12px;color:var(--muted);}
.catbar{display:flex;gap:4px;margin-top:12px;padding:4px;border-radius:14px;border:1px solid var(--border);background:#efeade;}
.catbtn{flex:1;padding:9px 6px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:color .2s,background .2s;}
.catbtn.active{background:linear-gradient(180deg,#9c6b3b,#7a4e24);color:#fff;box-shadow:inset 0 0 0 1px rgba(74,46,18,.35),0 4px 10px -6px rgba(107,68,35,.5);}

/* accent spine — signature */
.spine{background:linear-gradient(180deg,#a06a33,#7a4e24 45%,#553a20);box-shadow:0 0 18px rgba(138,90,43,.35);}

/* buttons */
.btn{display:block;width:100%;text-align:center;border-radius:var(--r);padding:15px 16px;font-size:14px;font-weight:600;
  transition:transform .12s ease,background-color .2s ease,border-color .2s ease;}
.btn:active{transform:scale(.975);}
.btn-primary{color:#fff;box-shadow:0 10px 22px -10px rgba(107,68,35,.6);}
.btn-ghost{border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:500;}
.btn-ghost:active{background:var(--surface-2);}
.btn-danger{border:1px solid rgba(163,64,47,.30);background:rgba(163,64,47,.08);color:var(--brick);}

/* rank arena */
.prompt{text-align:center;font-size:14px;color:var(--muted);margin:4px 0 16px;}
.arena{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.vs-line{position:absolute;top:24px;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;pointer-events:none;}
.vs-line > i{height:64px;width:3px;border-radius:999px;}
.vs-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
  font-family:var(--serif);font-style:italic;font-size:14px;color:var(--crimson-400);background:var(--bg);padding:0 8px;border-radius:999px;}
.card{display:block;width:100%;text-align:left;border-radius:var(--r-lg);border:1px solid var(--border);
  background:var(--surface);overflow:hidden;box-shadow:0 12px 26px -14px rgba(56,33,16,.22);transition:transform .12s ease,border-color .2s ease;}
.card:active{transform:scale(.975);border-color:rgba(138,90,43,.55);}
.cover{aspect-ratio:2/3;width:100%;background:#e7ddc9;}
.cover img{width:100%;height:100%;object-fit:cover;}
.cover-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 12px;
  background:linear-gradient(150deg,#efe7d5,#dbcdb0);}
.cover-ph b{font-family:var(--serif);font-size:24px;color:#8a5a2b;line-height:1;}
.cover-ph span{margin-top:6px;font-size:10px;line-height:1.25;color:var(--faint);}
/* cinema placeholder for movies / tv */
.cover-ph.film{background:linear-gradient(155deg,#e8e2d2,#d3c9af);}
.cover-ph.film .film-ic{width:36px;height:36px;color:var(--crimson-400);opacity:.92;margin-bottom:10px;}
.cover-ph.film b{font-size:15px;line-height:1.2;padding:0 6px;color:#5b4a34;}
.cover-ph.film span{color:#8a7a68;margin-top:5px;font-size:11px;}
.card-body{padding:12px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-meta .lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);}
.title{font-family:var(--serif);font-size:15px;line-height:1.25;font-weight:600;margin:6px 0 0;}
.mtitle{font-family:var(--serif);font-size:15px;line-height:1.28;font-weight:600;margin:6px 0 0;overflow-wrap:break-word;word-break:break-word;hyphens:auto;}
.author{font-size:12px;color:var(--muted);margin:2px 0 0;}
.rate{display:inline-flex;align-items:center;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;letter-spacing:.01em;color:var(--crimson-300);}
.note{margin:8px 0 0;text-align:center;font-size:11px;color:var(--faint);}

/* leaderboard */
.board-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.board-head h2{font-family:var(--serif);font-size:20px;margin:0;font-weight:600;}
.board-head span{font-size:12px;color:var(--faint);}
.filters{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.select-wrap{position:relative;flex:1;min-width:0;}
.select-wrap::after{content:'';position:absolute;right:12px;top:50%;transform:translateY(-25%);pointer-events:none;
  border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid var(--faint);}
.select-wrap.on::after{border-top-color:var(--crimson-400);}
.select{appearance:none;-webkit-appearance:none;-moz-appearance:none;width:100%;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;
  padding:10px 30px 10px 12px;transition:border-color .2s ease,color .2s ease;}
.select:focus{outline:none;border-color:rgba(138,90,43,.5);}
.select option{background:#fff;color:var(--text);}
.select-wrap.on .select{border-color:rgba(138,90,43,.45);color:var(--crimson-300);}
.clear-btn{font-size:12px;color:var(--crimson-300);padding:6px 4px;white-space:nowrap;}
.filter-count{font-size:12px;color:var(--faint);margin:-4px 0 12px;}
.board{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.row{display:flex;align-items:center;gap:12px;border-radius:16px;border:1px solid var(--border-soft);background:var(--surface);padding:10px 12px;}
.row.top{border-color:rgba(200,137,43,.5);background:rgba(200,137,43,.12);}
.rank-num{width:28px;flex:none;text-align:center;font-family:var(--serif);font-size:18px;color:var(--faint);font-variant-numeric:tabular-nums;}
.row.top .rank-num{color:var(--gold);}
.tile{height:48px;width:36px;flex:none;border-radius:6px;overflow:hidden;background:linear-gradient(150deg,#efe7d5,#d9ccb0);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:#8a5a2b;font-size:14px;}
.tile img{width:100%;height:100%;object-fit:cover;}
.row-main{min-width:0;flex:1;}
.row-main h3{font-family:var(--serif);font-size:15px;line-height:1.15;margin:0;font-weight:600;}
.row-main p{font-size:12px;color:var(--muted);margin:2px 0 0;}

/* library */
.lib h2{font-family:var(--serif);font-size:20px;margin:0 0 12px;font-weight:600;}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{border-radius:18px;border:1px solid var(--border-soft);background:var(--surface);padding:16px;}
.stat b{display:block;font-family:var(--serif);font-size:30px;color:var(--crimson-400);line-height:1;font-variant-numeric:tabular-nums;font-weight:600;}
.stat .l{margin-top:8px;font-size:14px;color:var(--text);}
.stat .s{font-size:11px;color:var(--faint);}
.panel{margin-top:12px;border-radius:18px;border:1px solid var(--border-soft);background:var(--surface);padding:16px;
  display:flex;align-items:center;justify-content:space-between;}
.panel span{font-size:14px;color:#4a3826;}
.panel b{font-family:var(--serif);font-size:18px;color:var(--crimson-400);font-variant-numeric:tabular-nums;}
.sub-h{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin:20px 0 4px;}
.pile{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:6px;}
.pile li{display:flex;align-items:center;gap:12px;border-radius:12px;border:1px solid var(--border-soft);background:#fbf8f1;padding:8px 12px;}
.pile .mini{height:32px;width:24px;flex:none;border-radius:5px;background:#e7ddc9;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:11px;color:#8a5a2b;}
.pile .t{font-size:14px;margin:0;}
.pile .a{font-size:11px;color:var(--faint);margin:0;}

/* empty + import panels */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:70px 24px;}
.badge-lg{height:56px;width:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;color:#fff;margin-bottom:16px;}
.empty h2{font-family:var(--serif);font-size:20px;margin:0;font-weight:600;}
.empty p{margin:8px 0 0;font-size:14px;color:var(--muted);max-width:20rem;}
.panel-import{padding:16px 2px 8px;display:flex;flex-direction:column;gap:14px;}
.panel-import.center{align-items:center;text-align:center;padding-top:70px;}
.hero2{text-align:center;padding-top:6px;}
.hero2 h2{font-family:var(--serif);font-size:24px;margin:0;font-weight:600;}
.lede2{color:var(--muted);line-height:1.55;margin:8px 0 0;font-size:14px;}
.actions{display:flex;flex-direction:column;gap:12px;}
.file-label{position:relative;overflow:hidden;}
.file-label input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.err{text-align:center;font-size:14px;color:var(--brick);min-height:1.2rem;margin:0;}
.or{display:flex;align-items:center;gap:12px;margin:4px 2px;color:var(--faint);font-size:11px;letter-spacing:.15em;text-transform:uppercase;}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--border);}
.paste{width:100%;min-height:104px;resize:vertical;border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;padding:12px;transition:border-color .2s ease;}
.paste::placeholder{color:var(--dim);}
.paste:focus{outline:none;border-color:rgba(138,90,43,.5);}
.info{margin-top:6px;border-radius:18px;border:1px solid var(--border-soft);background:#fbf8f1;padding:16px;font-size:14px;color:var(--muted);line-height:1.6;}
.info b{color:var(--text);display:block;margin-bottom:4px;font-weight:600;}
.info em{color:var(--text);font-style:normal;}
.spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(138,90,43,.25);border-top-color:var(--crimson);animation:spin .9s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* manual add form */
.addform{margin-top:0;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-lg);padding:14px;display:flex;flex-direction:column;gap:10px;text-align:left;}
.addform-head{display:flex;align-items:center;justify-content:space-between;}
.addform-head h3{font-family:var(--serif);font-size:16px;margin:0;font-weight:600;}
.addform-x{font-size:13px;color:var(--muted);padding:4px 6px;}
.field{width:100%;border-radius:12px;border:1px solid var(--border);background:#fbf9f3;color:var(--text);font-family:inherit;font-size:14px;padding:11px 12px;transition:border-color .2s ease;}
.field::placeholder{color:var(--dim);}
.field:focus{outline:none;border-color:rgba(138,90,43,.5);}

/* live search */
.livewrap{position:relative;}
.live-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:0 0 6px 2px;}
.live-input{width:100%;border-radius:12px;border:1px solid var(--border);background:#ffffff;color:var(--text);
  font-family:inherit;font-size:14px;padding:12px 12px 12px 38px;transition:border-color .2s ease;}
.live-input::placeholder{color:var(--dim);}
.live-input:focus{outline:none;border-color:rgba(138,90,43,.55);}
.live-ic{position:absolute;left:13px;top:calc(50% + 3px);transform:translateY(-50%);width:16px;height:16px;color:var(--faint);pointer-events:none;}
.live-drop{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;border-radius:14px;border:1px solid var(--border);
  background:#ffffff;box-shadow:0 20px 44px -16px rgba(56,33,16,.28);overflow:hidden auto;max-height:328px;display:none;}
.live-drop.open{display:block;animation:fade .18s ease both;}
.sug{display:flex;align-items:center;gap:11px;padding:9px 11px;cursor:pointer;border-bottom:1px solid var(--border-soft);}
.sug:last-child{border-bottom:none;}
.sug:hover,.sug:active{background:rgba(138,90,43,.10);}
.sug-thumb{width:34px;height:50px;flex:none;border-radius:5px;object-fit:cover;background:#e7ddc9;}
.sug-ph{width:34px;height:50px;flex:none;border-radius:5px;background:linear-gradient(155deg,#e8e2d2,#d3c9af);display:flex;align-items:center;justify-content:center;color:var(--crimson-400);}
.sug-ph svg{width:16px;height:16px;}
.sug-main{min-width:0;flex:1;}
.sug-main b{font-family:var(--serif);font-size:14px;font-weight:600;display:block;line-height:1.15;}
.sug-main span{font-size:12px;color:var(--faint);}
.sug-plus{flex:none;color:var(--crimson-400);font-size:20px;line-height:1;padding:0 4px;}
.sug-empty{padding:13px;color:var(--faint);font-size:13px;text-align:center;}

/* recommendations carousel */
.rec{margin-top:30px;padding-top:20px;border-top:1px solid var(--border-soft);}
.rec-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.rec-head h3{font-family:var(--serif);font-size:18px;margin:0;font-weight:600;}
.rec-head span{font-size:12px;color:var(--faint);}
.rec-sublede{font-size:12px;color:var(--faint);margin:0 0 12px;}
.rec-row{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;}
.rec-row::-webkit-scrollbar{height:6px;}
.rec-row::-webkit-scrollbar-thumb{background:rgba(56,33,16,.18);border-radius:999px;}
.rec-card{flex:0 0 auto;width:136px;max-width:170px;scroll-snap-align:start;border-radius:16px;border:1px solid var(--border-soft);
  background:var(--surface);overflow:hidden;display:flex;flex-direction:column;
  transition:opacity .32s ease,transform .32s ease,max-width .34s ease,margin .34s ease,padding .34s ease,border-width .34s ease;}
.rec-card.leaving{opacity:0;transform:scale(.9);max-width:0;margin-left:-12px;border-width:0;pointer-events:none;}
.rec-cover{width:100%;aspect-ratio:2/3;background:#e7ddc9;}
.rec-cover img{width:100%;height:100%;object-fit:cover;}
.rec-cover .cover-ph b{font-size:18px;}
.rec-cover .cover-ph.film .film-ic{width:26px;height:26px;margin-bottom:6px;}
.rec-cover .cover-ph.film b{font-size:12px;}
.rec-cover .cover-ph span{font-size:9px;}
.rec-info{padding:9px 10px 4px;flex:1;}
.rec-title{font-family:var(--serif);font-size:13px;line-height:1.2;margin:0;font-weight:600;}
.rec-sub{font-size:11px;color:var(--muted);margin:2px 0 0;}
.rec-add{margin:6px 8px 10px;border-radius:10px;padding:8px 6px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(180deg,#a06a33,#7a4e24);box-shadow:0 6px 14px -6px rgba(107,68,35,.55);transition:transform .12s ease;}
.rec-add:active{transform:scale(.94);}

/* leaderboard search + segment filter */
.lbfilter{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;}
.lb-searchcell{flex:1;min-width:0;}
.lb-searchwrap .live-input{padding-top:11px;padding-bottom:11px;}
.segwrap{position:relative;flex:none;}
.segbtn{display:inline-flex;align-items:center;gap:6px;height:44px;padding:0 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;transition:border-color .2s,color .2s;}
.segbtn.on{border-color:rgba(138,90,43,.45);color:var(--crimson-300);}
.segbtn .caret{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid currentColor;opacity:.75;}
.seg-drop{position:absolute;right:0;top:calc(100% + 6px);z-index:40;min-width:190px;border-radius:14px;border:1px solid var(--border);
  background:#ffffff;box-shadow:0 20px 44px -16px rgba(56,33,16,.28);
  overflow:hidden;animation:fade .16s ease both;}
.seg-opt{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:11px 13px;font-size:13px;color:#4a3826;border-bottom:1px solid var(--border-soft);transition:background .15s;}
.seg-opt:last-child{border-bottom:none;}
.seg-opt:hover,.seg-opt:active{background:rgba(138,90,43,.10);}
.seg-opt.on{color:var(--crimson-300);font-weight:600;}
.seg-check{flex:none;width:16px;height:16px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--crimson-400);}
.seg-opt.on .seg-check{border-color:rgba(138,90,43,.55);background:rgba(138,90,43,.14);}
.lb-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:-2px 0 12px;}
.lb-meta .filter-count{margin:0;}

/* stats dashboard */
.dash{margin:4px 0 8px;border-radius:20px;border:1px solid var(--border-soft);background:linear-gradient(180deg,#ffffff,#faf6ee);padding:16px;}
.dash-title{font-family:var(--serif);font-size:16px;font-weight:600;margin:0 0 12px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dash-grid .stat{padding:14px;border-radius:16px;}
.dash-grid .stat b{font-size:26px;}
.dash-summary{margin-top:12px;padding:12px 14px;border-radius:14px;background:#f3ecdb;border:1px solid #e3d4ad;
  font-size:13px;line-height:1.5;color:#4a3826;}
.dash-summary b{color:var(--crimson-300);font-weight:700;font-variant-numeric:tabular-nums;}
.setting-row{display:flex;align-items:center;gap:12px;margin-top:12px;border-radius:16px;border:1px solid var(--border-soft);background:var(--surface);padding:12px 14px;}
.setting-label{flex:1;min-width:0;}
.setting-label b{display:block;font-size:14px;font-weight:600;color:var(--text);}
.setting-label span{font-size:11px;color:var(--faint);}

/* undo banner */
.undo-wrap{position:fixed;left:0;right:0;bottom:92px;z-index:30;pointer-events:none;display:flex;justify-content:center;padding:0 16px;}
.undo-banner{pointer-events:auto;display:flex;align-items:center;gap:14px;max-width:412px;width:100%;
  border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 16px 36px -16px rgba(56,33,16,.3);padding:11px 14px;}
.undo-txt{flex:1;font-size:13px;color:var(--muted);}
.undo-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--crimson-300);padding:6px 8px;border-radius:10px;transition:background .15s;}
.undo-btn:active{background:rgba(138,90,43,.12);}
.undo-btn svg{width:16px;height:16px;}

/* sentiment (initial ranking) */
.rate-new{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:1px 8px;}
.sentiment-card{max-width:200px;margin:6px auto 20px;}
.sentiment-card .cover{border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;box-shadow:0 12px 26px -14px rgba(56,33,16,.22);}
.sentiment-btns{display:flex;flex-direction:column;gap:10px;}
.btn.sent{color:#fff;font-weight:600;box-shadow:0 8px 18px -10px rgba(56,33,16,.4);}
.sent-loved{background:linear-gradient(180deg,#3f7d3a,#2c5a28);}
.sent-liked{background:linear-gradient(180deg,#6a9b4e,#4e7a37);}
.sent-ok{background:linear-gradient(180deg,#c9962f,#a8781f);}
.sent-disliked{background:linear-gradient(180deg,#b5654a,#8f4a34);}

/* re-rankable leaderboard rows */
.row{cursor:pointer;transition:transform .1s ease,border-color .2s ease;}
.row:active{transform:scale(.99);}
.rerank-ic{width:16px;height:16px;flex:none;color:var(--faint);opacity:.55;margin-left:2px;}
.row:hover .rerank-ic{color:var(--crimson-400);opacity:1;}

/* same-author reference panels flanking the matchup (desktop only) */
.author-panel{position:fixed;top:150px;width:320px;max-height:calc(100vh - 180px);overflow:auto;display:none;z-index:6;
  -ms-overflow-style:none;scrollbar-width:none;}
.author-panel::-webkit-scrollbar{display:none;}
.author-left{right:calc(50% + 232px);}
.author-right{left:calc(50% + 232px);}
@media (min-width:1160px){.author-panel{display:block;}}
.author-panel h4{font-family:var(--serif);font-size:14px;font-weight:600;margin:0 0 10px;color:var(--muted);}
.author-grid{display:flex;flex-direction:column;gap:8px;}
.am{border:1px solid var(--border-soft);background:var(--surface);border-radius:12px;overflow:hidden;display:flex;align-items:center;gap:10px;padding:6px 10px 6px 6px;box-shadow:0 8px 18px -14px rgba(56,33,16,.2);}
.am-cover{width:44px;height:66px;flex:none;border-radius:6px;overflow:hidden;background:#e7ddc9;display:flex;align-items:center;justify-content:center;}
.am-cover img{width:100%;height:100%;object-fit:cover;}
.am-cover span{font-family:var(--serif);font-size:16px;color:#8a5a2b;}
.am-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.am-title{font-family:var(--serif);font-size:13px;line-height:1.25;margin:0;font-weight:600;overflow-wrap:break-word;word-break:break-word;}

/* full-width Top 10 band across the bottom of the rank page — 10 across, no scroll */
.top-ten-bar{position:relative;left:50%;transform:translateX(-50%);width:100vw;flex:none;margin-bottom:78px;
  background:rgba(249,246,240,.97);border-top:1px solid var(--border);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 -8px 24px -18px rgba(56,33,16,.4);z-index:15;}
.ttb-inner{padding:8px 16px 10px;}
.ttb-label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 2px 7px;}
.tt-row{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;align-items:start;}
.tt-card{min-width:0;}
.tt-cover{position:relative;width:100%;height:132px;border-radius:9px;overflow:hidden;background:#e7ddc9;border:1px solid var(--border-soft);}
.tt-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.tt-img img{width:100%;height:100%;object-fit:cover;}
.tt-ini{font-family:var(--serif);font-size:16px;color:#8a5a2b;}
.tt-rank{position:absolute;top:3px;left:3px;min-width:16px;height:16px;padding:0 4px;border-radius:5px;background:rgba(56,33,16,.85);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;}
.tt-rate{position:absolute;bottom:3px;right:3px;background:rgba(255,255,255,.92);border-radius:6px;padding:0 5px;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;box-shadow:0 1px 4px rgba(56,33,16,.2);}
.tt-name{font-family:var(--serif);font-size:12px;line-height:1.2;margin:5px 2px 0;font-weight:600;overflow-wrap:break-word;word-break:break-word;hyphens:auto;}
@media (max-width:600px){.tt-cover{height:88px;}.tt-rate{font-size:9px;padding:0 3px;}.tt-rank{min-width:14px;height:14px;font-size:9px;}.ttb-label{font-size:10px;}.tt-row{gap:5px;}.tt-name{font-size:10px;}}

/* backup & sync */
.rank-add{display:block;width:auto;margin:0 auto 10px;padding:8px 16px;font-size:13px;border-radius:999px;}
.backup{margin-top:26px;border-top:1px solid var(--border-soft);padding-top:6px;}
.backup-btns{display:flex;gap:10px;flex-wrap:wrap;}
.backup-btns .btn{flex:1;min-width:140px;}
.sync-code{width:100%;box-sizing:border-box;height:64px;resize:vertical;border:1px solid var(--border);border-radius:12px;
  background:var(--surface);color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;
  padding:10px 12px;line-height:1.35;word-break:break-all;margin-bottom:10px;}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;}
.tabbar .inner{max-width:448px;margin:0 auto;}
.tabbar .bar{margin:0 12px 12px;border-radius:18px;border:1px solid var(--border);
  background:rgba(255,250,242,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 16px 34px -14px rgba(56,33,16,.28);display:flex;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;transition:transform .12s ease;position:relative;}
.tab:active{transform:scale(.95);}
.tab svg{width:20px;height:20px;color:var(--faint);}
.tab .lab{font-size:11px;color:var(--faint);}
.tab.active svg{color:var(--crimson-400);}
.tab.active .lab{color:var(--crimson-300);font-weight:600;}
.tab .cnt{position:absolute;top:4px;right:calc(50% - 26px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;
  background:var(--crimson-600);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;}

@media (prefers-reduced-motion:reduce){ *{animation:none !important;transition:none !important;} }

/* ----------------------------- CSV (books) ------------------------ */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* ignore */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v && v.trim() !== ''));
}
function cleanISBN(raw) {
  if (!raw) return '';
  return String(raw).replace(/[="]/g, '').replace(/[^0-9Xx]/g, '');
}
function headerIndex(header, ...names) {
  const norm = header.map(h => (h || '').trim().toLowerCase());
  for (const name of names) { const i = norm.indexOf(name.toLowerCase()); if (i !== -1) return i; }
  return -1;
}
const GENRE_ALIAS = {
  'sci-fi': 'Science Fiction', 'scifi': 'Science Fiction', 'sf': 'Science Fiction',
  'ya': 'Young Adult', 'non-fiction': 'Nonfiction', 'nonfiction': 'Nonfiction',
  'historical-fiction': 'Historical Fiction', 'graphic-novel': 'Graphic Novels', 'graphic-novels': 'Graphic Novels',
};
const NON_GENRE = new Set(['read', 'to-read', 'currently-reading', 'owned', 'own', 'owned-books', 'to-buy',
  'wishlist', 'wish-list', 'favorites', 'favourites', 'favorite', 'favourite', 'default', 'all', 'my-books', 'books',
  'series', 're-read', 'reread', 'dnf', 'did-not-finish', 'abandoned', 'unfinished', 'library', 'borrowed',
  'kindle', 'ebook', 'ebooks', 'audiobook', 'audiobooks', 'audio', 'physical']);
function tidyGenre(token) {
  const low = token.trim().toLowerCase();

}
function genresFromShelves(raw) {
  if (!raw) return [];
  const out = [];
  for (const part of String(raw).split(',')) {
    const t = part.trim();
    if (!t || NON_GENRE.has(t.toLowerCase())) continue;
    const g = tidyGenre(t);
    if (g && !out.includes(g)) out.push(g);
    if (out.length >= 4) break;
  }
  return out;
}
function genresFromInput(str) {
  if (!str) return [];
  const out = [];
  for (const part of String(str).split(',')) {
    const t = part.trim();
    if (!t) continue;
    const g = tidyGenre(t);
    if (g && !out.includes(g)) out.push(g);
    if (out.length >= 4) break;
  }
  return out;
}
function booksFromCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const header = rows[0];
  const iTitle = headerIndex(header, 'Title');
  const iAuthor = headerIndex(header, 'Author');
  const iIsbn13 = headerIndex(header, 'ISBN13');
  const iIsbn = headerIndex(header, 'ISBN');
  const iShelves = headerIndex(header, 'Bookshelves');
  if (iTitle === -1) return [];
  const books = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const title = (row[iTitle] || '').trim();
    if (!title) continue;
    const author = iAuthor !== -1 ? (row[iAuthor] || '').trim() : '';
    const isbn = cleanISBN(row[iIsbn13] || '') || cleanISBN(row[iIsbn] || '');
    const genres = iShelves !== -1 ? genresFromShelves(row[iShelves]) : [];
    books.push(makeBook(title, author, isbn, genres));
  }
  return books;
}

/* ----------------------------- items ------------------------------ */
function makeBook(title, author, isbn, genres) {
  const a = author || 'Unknown author';
  return { id: 'b' + (uid++), kind: 'books', title, author: a, subtitle: a, isbn: isbn || '',
    genres: Array.isArray(genres) ? genres : [], cover: undefined, elo: undefined };
}
function makeMedia(title, year, cover, category) {
  return { id: 'x' + (uid++), kind: category, title, author: '', subtitle: year || '', year: year || '',
    isbn: '', genres: [], cover: (cover === '' || cover === undefined) ? null : cover, elo: undefined };
}

/* --------------------- movies/tv live lookup ---------------------- */
// Free, keyless, CORS-friendly: Apple iTunes Search API (JSONP fallback).
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '__sr' + (uid++) + '_' + Date.now().toString(36);
    const s = document.createElement('script');
    let done = false;
    const clean = () => { try { delete window[cb]; } catch (_) { window[cb] = undefined; } if (s && s.parentNode) s.parentNode.removeChild(s); };
    window[cb] = d => { done = true; resolve(d); clean(); };
    s.onerror = () => { if (!done) { clean(); reject(new Error('jsonp')); } };
    s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb;
    (document.head || document.documentElement).appendChild(s);
    setTimeout(() => { if (!done) { clean(); reject(new Error('timeout')); } }, 9000);
  });
}
let lastNetOK = true;
// Try the URL directly, then through several CORS proxies, returning the FIRST response

// (returned as HTTP 200) from being mistaken for a real empty result.
async function robustJSON(url, ok) {
  ok = ok || (d => !!d);
  const tries = [
    async () => { const r = await fetch(url); if (r && r.ok) return await r.json(); },
    async () => { const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url)); if (r && r.ok) { const w = await r.json(); if (w && typeof w.contents === 'string') return JSON.parse(w.contents); } },
    async () => { const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)); if (r && r.ok) return await r.json(); },
    async () => { const r = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(url)); if (r && r.ok) return await r.json(); },
    async () => { const r = await fetch('https://thingproxy.freeboard.io/fetch/' + url); if (r && r.ok) return await r.json(); },
  ];
  for (const t of tries) { try { const d = await t(); if (d && ok(d)) return d; } catch (_) {} }
  return null;
}
async function getJSON(url) { return robustJSON(url); }
async function itunesSearch(term, media, entity, limit) {
  const q = new URLSearchParams({ term: term, media: media, limit: String(limit || 1), country: 'US' });
  if (entity) q.set('entity', entity);
  const url = 'https://itunes.apple.com/search?' + q.toString();
  const valid = d => d && Array.isArray(d.results);
  // direct + CORS proxies, only trusting a genuine iTunes payload
  let d = await robustJSON(url, valid);
  // JSONP (script tag) as an extra path that sidesteps CORS
  if (!d) { try { const j = await jsonp(url); if (valid(j)) d = j; } catch (_) {} }
  if (d) { lastNetOK = true; return d.results; }
  lastNetOK = false; // nothing could reach a real iTunes response
  return [];
}
function bigArt(url) { return url ? url.replace(/\/\d+x\d+bb\.(jpg|png)$/i, '/600x600bb.$1') : ''; }
const mediaCache = {}; // key `${cat}|${title.toLowerCase()}` -> descriptor|null (per session)
async function lookupMedia(term, category) {
  const key = category + '|' + term.trim().toLowerCase();
  if (Object.prototype.hasOwnProperty.call(mediaCache, key)) return mediaCache[key];
  const isTV = category === 'tv';
  const results = await itunesSearch(term, isTV ? 'tvShow' : 'movie', isTV ? 'tvSeason' : '');
  const top = results && results[0];
  let out = null;
  if (top) {
    const title = isTV ? (top.artistName || top.collectionName || top.trackName || term)
                       : (top.trackName || top.collectionName || term);
    const year = top.releaseDate ? String(top.releaseDate).slice(0, 4) : '';
    const genres = top.primaryGenreName ? [tidyGenre(top.primaryGenreName)] : [];
    out = { title, year, cover: bigArt(top.artworkUrl100 || top.artworkUrl60 || ''), genres };
  }
  mediaCache[key] = out;

}
// Multiple ranked suggestions for the live-search dropdown (deduped by title).
async function itunesSuggest(term, category, limit) {
  const isTV = category === 'tv';
  const results = await itunesSearch(term, isTV ? 'tvShow' : 'movie', isTV ? 'tvSeason' : '', limit || 8);
  const seen = new Set(), out = [];
  for (const top of results) {
    const title = isTV ? (top.artistName || top.collectionName || top.trackName)
                       : (top.trackName || top.collectionName);
    if (!title) continue;
    const key = title.trim().toLowerCase();
    if (seen.has(key)) continue;
    seen.add(key);
    const art = top.artworkUrl60 || top.artworkUrl100 || '';
    const year = top.releaseDate ? String(top.releaseDate).slice(0, 4) : '';
    out.push({ title, year, thumb: art, cover: bigArt(top.artworkUrl100 || art), genres: top.primaryGenreName ? [tidyGenre(top.primaryGenreName)] : [] });
    if (out.length >= 6) break;

}
function parseTitleLines(text) {
  const seen = new Set(), out = [];
  for (const raw of String(text).split(/\r?\n/)) {
    let t = raw.trim();
    if (!t) continue;
    t = t.replace(/^\s*(?:\d+[.)]|[-*•])\s*/, '');       // list markers
    t = t.replace(/\s*[—–-]\s*S\d{1,2}\s*E\d{1,3}.*$/i, ''); // trailing SxxExx (TV Time)
    t = t.replace(/\s*·.*$/, '');                          // middot metadata
    t = t.replace(/\s*\(\d{4}\)\s*$/, '');                 // trailing (year)
    t = t.trim();

  const titles = parseTitleLines(text);

  const L = state.libs[category];
  state.importing = { total: titles.length, done: 0, category };
  render();
  for (const t of titles) {
    let item;
    try {
      const d = await lookupMedia(t, category);
      item = d ? makeMedia(d.title || t, d.year, d.cover || null, category) : makeMedia(t, '', null, category);
      if (d && d.genres && d.genres.length) item.genres = d.genres;
    } catch (_) { item = makeMedia(t, '', null, category); }
    L.unranked.push(item);
    state.importing.done++;

  state.importing = null;

}
async function enrichItem(item, category) {
  try {
    const d = await lookupMedia(item.title, category);
    if (!d) return;
    let changed = false;
    if (d.cover && !item.cover) { item.cover = d.cover; changed = true; }
    if (d.year && !item.year) { item.year = d.year; item.subtitle = d.year; changed = true; }
    if (d.genres && d.genres.length && !item.genres.length) { item.genres = d.genres; changed = true; }
    if (changed) render();
  } catch (_) {}
}

/* --------------------------- persistence -------------------------- */
function curIds(L) {

}

  return { unranked, master: L.master, totalMatchups: L.totalMatchups,
    filterGenre: L.filterGenre, filterAuthor: L.filterAuthor,
    search: L.search || '', segments: L.segments || [], current: curIds(L) };
}
function save() {
  if (!storageOK) return;
  try {
    const data = { v: 2, uid, savedAt: Date.now(), category: state.category, tab: state.tab, calibrations: state.calibrations,
      libs: { books: serLib(state.libs.books), movies: serLib(state.libs.movies), tv: serLib(state.libs.tv) } };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

}

function deserLib(o, cat) {

  L.master = Array.isArray(o.master) ? o.master : [];
  // Re-fetch a book cover that a past session cached as a miss; and backfill movie
  // posters from the built-in catalog onto items added before posters existed.
  for (const it of [...L.master, ...L.unranked]) {
    if (!it) continue;
    if (it.kind === 'books' && it.cover === null) it.cover = undefined;
    if (it.kind === 'movies' && !it.cover) { const p = catalogPosterFor('movies', it.title); if (p) { it.cover = p.thumb; it.coverAlt = p.full; } }
  }

  L.filterAuthor = o.filterAuthor || 'all';

  L.segments = Array.isArray(o.segments) ? o.segments : [];
  L.segOpen = false;
  L.current = null;
  if (o.current) {
    const left = findInLib(L, o.current.leftId), right = findInLib(L, o.current.rightId);
    if (left && right) L.current = { phase: 'match', left, right, newBook: null, isIntro: false };
  }

}
function normalizeLib(L, cat) {
  for (const it of [...L.master, ...L.unranked]) {
    if (!it.kind) it.kind = cat;
    if (it.subtitle === undefined) it.subtitle = cat === 'books' ? (it.author || '') : (it.year || '');
    if (!Array.isArray(it.genres)) it.genres = [];

function migrateV1() {
  try {
    const raw = localStorage.getItem('shelfrank.v1');
    if (!raw) return false;
    const d = JSON.parse(raw);
    const L = state.libs.books;
    L.unranked = Array.isArray(d.unranked) ? d.unranked : [];
    L.master = Array.isArray(d.master) ? d.master : [];
    L.totalMatchups = d.totalMatchups || 0;
    uid = d.uid || 0;
    normalizeLib(L, 'books');

  } catch (_) { return false; }
}
function load() {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (_) { storageOK = false; return false; }
  if (!raw) return migrateV1();
  try {
    const data = JSON.parse(raw);
    uid = data.uid || 0;
    if (data.calibrations) state.calibrations = data.calibrations;
    state.libs = {
      books: deserLib(data.libs && data.libs.books, 'books'),
      movies: deserLib(data.libs && data.libs.movies, 'movies'),
      tv: deserLib(data.libs && data.libs.tv, 'tv'),

    state.category = (data.category && state.libs[data.category]) ? data.category : 'books';
    state.tab = data.tab || 'rank';
    for (const cat of ['books', 'movies', 'tv']) {
      const L = state.libs[cat];

    libs: { books: serLib(state.libs.books), movies: serLib(state.libs.movies), tv: serLib(state.libs.tv) } });

// Accepts raw JSON or a base64 sync code; replaces all sections and reloads.
function importBackupText(text) {

// On open: load the shared repo file (data.json) if it's newer than this device's copy,

function hasData(L) { L = L || cur(); return L.master.length + L.unranked.length > 0; }

/* ---- matchmaking ------------------------------------------------- *
 * Rating is a 4-tier commitment (5 Stars / Liked / OK / Disliked).
 * The list is always grouped by tier; a new title only faces books in
 * its OWN tier to find its spot inside that tier. If it's the first of
 * its tier, it just drops in (no matchup). Score is anchored to the
 * tier's band, so tiers can never invert.
 * ------------------------------------------------------------------ */
const SENTIMENT_LEVELS = [
  { key: 'loved',    label: '★★★★★ 5 Stars', range: [9, 10] },
  { key: 'liked',    label: 'Liked it',    range: [6, 9] },
  { key: 'ok',       label: 'It was OK',   range: [3, 6] },
  { key: 'disliked', label: 'Disliked it', range: [1, 3] },
];
function generateMatchup(L) {
  L = L || cur();
  if (L.current) return; // never interrupt an in-progress step
  if (L.unranked.length > 0) {              // introduce the next new item -> sentiment first
    const item = L.unranked.shift();
    L.current = { phase: 'sentiment', item, left: null, right: null, newBook: item, isIntro: true };
    return;
  }
  // refinement: sharpen order WITHIN a tier that has 2+ items
  const groups = ['loved', 'liked', 'ok', 'disliked'].map(t => L.master.filter(x => x.tier === t)).filter(g => g.length >= 2);
  if (!groups.length) { L.current = null; return; }
  const g = groups[Math.floor(Math.random() * groups.length)];
  let a = g[Math.floor(Math.random() * g.length)];
  let b = g[Math.floor(Math.random() * g.length)];
  if (a === b) b = g[(g.indexOf(a) + 1) % g.length];
  const flip = Math.random() < 0.5;
  L.current = { phase: 'match', left: flip ? a : b, right: flip ? b : a, newBook: null, isIntro: false };
}
function rateSentiment(key) {
  const L = cur(); const c = L.current;
  if (!c || c.phase !== 'sentiment') return;
  undoState = { category: state.category, lib: snapshotLib(L) };
  const item = c.item;
  item.tier = (SENTIMENT_LEVELS.find(x => x.key === key) ? key : 'ok');
  const insertAt = tierStart(L.master, item.tier);
  L.master.splice(insertAt, 0, item);       // drop in at the top of its tier
  const hiEdge = nearestBoundaryItem(L, item, 'up');   // bottom of the nearest higher band
  const loEdge = nearestBoundaryItem(L, item, 'down');  // top of the nearest lower band
  const hiEdgeId = hiEdge ? hiEdge.id : null, loEdgeId = loEdge ? loEdge.id : null;
  const count = extendedOthers(L, item, hiEdgeId, loEdgeId).length;
  if (count === 0) {                         // truly nothing to compare against — just seat it
    L.current = null; generateMatchup(L);
  } else {                                    // order within its tier, with soft band edges
    const rounds = Math.max(1, state.calibrations | 0);
    nextCalibration(L, item, 0, count - 1, rounds, rounds, hiEdgeId, loEdgeId);
  }
  scheduleUndo();
  render();
}
function choose(side) {
  const L = cur(); const c = L.current; if (!c || c.phase === 'sentiment') return;
  undoState = { category: state.category, lib: snapshotLib(L) }; // snapshot BEFORE mutating
  const winner = side === 'left' ? c.left : c.right;
  const loser = side === 'left' ? c.right : c.left;
  winner.matches = (winner.matches || 0) + 1;
  loser.matches = (loser.matches || 0) + 1;
  L.totalMatchups++;

  if (c.isIntro && c.newBook) { // calibrating a new title within its tier — bracket by the outcome
    const item = c.newBook;
    const opp = c.left === item ? c.right : c.left;
    const itemWon = winner === item;
    const mid = Math.floor(((c.lo || 0) + (c.hi || 0)) / 2);
    let lo = c.lo || 0, hi = c.hi || 0;
    if (itemWon) { hi = mid - 1; moveItemAdjacent(L.master, item, opp, true); }   // ranks ABOVE -> only higher next
    else { lo = mid + 1; moveItemAdjacent(L.master, item, opp, false); }          // ranks BELOW -> only lower next
    nextCalibration(L, item, lo, hi, (c.roundsLeft || 1) - 1, c.rounds, c.hiEdgeId, c.loEdgeId);
    scheduleUndo(); render(); return;
  }

  // refine: reorder two items within the same tier
  const before = new Map(L.master.map((it, i) => [it, i]));
  slotWinner(L.master, winner, loser);
  L.master.forEach((it, i) => { const b = before.get(it); if (b !== undefined && b !== i) it.moves = (it.moves || 0) + Math.abs(i - b); });
  L.current = null; generateMatchup(L);
  scheduleUndo(); render();
}
function skip() {
  const L = cur(); const c = L.current; if (!c) return;
  if (c.phase === 'sentiment') { L.unranked.push(c.item); }             // not yet rated
  else if (c.isIntro && c.newBook) {                                    // pull the provisional item back out
    const i = L.master.indexOf(c.newBook);
    if (i !== -1) L.master.splice(i, 1);
    c.newBook.tier = undefined;
    L.unranked.push(c.newBook);
  }
  L.current = null; generateMatchup(L);
  render();
}
function resetCurrent() {
  if (typeof confirm === 'function' && !confirm('Reset all ' + CATS[state.category].plural + ' rankings? This cannot be undone.')) return;
  state.libs[state.category] = makeLib();

  state.libs = { books: makeLib(), movies: makeLib(), tv: makeLib() };

  L.master = []; L.unranked = items; L.totalMatchups = 0; L.current = null;

/* ============================ undo ================================ *
 * Snapshot the whole section before a vote; a 4-second banner offers
 * a one-tap revert that restores slot order, Elo, metrics & counters.
 * ================================================================== */
let undoState = null; // { category, lib } | null
let undoTimer = null;

function snapshotLib(L) {
  const map = new Map();
  const copy = it => { const c = { ...it, genres: [...(it.genres || [])] }; map.set(it.id, c); return c; };
  const master = L.master.map(copy);
  const unranked = L.unranked.map(copy);
  const ref = x => { if (!x) return null; return map.has(x.id) ? map.get(x.id) : copy(x); };
  let current = null;
  const c = L.current;
  if (c) {
    if (c.phase === 'sentiment') {
      const item = ref(c.item);
      current = { phase: 'sentiment', item, left: null, right: null, newBook: item, isIntro: true };
    } else {
      current = { phase: 'match', left: ref(c.left), right: ref(c.right),
        newBook: c.newBook ? ref(c.newBook) : null, isIntro: !!c.isIntro,
        oppId: c.oppId, lo: c.lo, hi: c.hi, rounds: c.rounds, roundsLeft: c.roundsLeft,
        hiEdgeId: c.hiEdgeId, loEdgeId: c.loEdgeId };
    }
  }
  return { unranked, master, totalMatchups: L.totalMatchups, current,
    filterGenre: L.filterGenre, filterAuthor: L.filterAuthor,
    search: L.search, segments: [...(L.segments || [])], segOpen: L.segOpen };
}
function scheduleUndo() {
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { undoState = null; undoTimer = null; render(); }, 4000);
}
function clearUndo() { if (undoTimer) clearTimeout(undoTimer); undoTimer = null; undoState = null; }
function undoLastVote() {
  if (!undoState) return;
  state.libs[undoState.category] = undoState.lib; // wholesale restore (order, elo, metrics, counters, current)
  state.category = undoState.category;
  clearUndo();
  render();
}

/* ==================== metrics: volatility / popularity ============ */
// Per-item volatility = accumulated slot displacement per resolved match.
function volatilityRatio(it) { return (it.moves || 0) / Math.max(1, it.matches || 0); }
function isSolidified(it) { return (it.matches || 0) >= 3 && volatilityRatio(it) <= 0.5; }
function isContested(it) { return (it.matches || 0) >= 3 && volatilityRatio(it) >= 1.25; }

// Hyper-popular / mainstream keyphrases; a title containing one is "not niche".
const POPULAR = {
  books: ['harry potter', 'lord of the rings', 'the hobbit', '1984', 'pride and prejudice', 'the great gatsby',
    'to kill a mockingbird', 'the catcher in the rye', 'dune', 'the hunger games', 'twilight', 'da vinci code',
    'the alchemist', 'fault in our stars', 'gone girl', 'fifty shades', 'dragon tattoo', 'game of thrones',
    'the shining', 'the little prince', 'a game of thrones', 'the fellowship of the ring'],
  movies: ['the matrix', 'inception', 'the dark knight', 'titanic', 'avatar', 'star wars', 'the godfather',
    'pulp fiction', 'forrest gump', 'shawshank', 'jurassic park', 'avengers', 'interstellar', 'joker',
    'gladiator', 'fight club', 'the lion king', 'frozen', 'spider-man', 'batman'],
  tv: ['breaking bad', 'game of thrones', 'stranger things', 'the office', 'friends', 'the crown', 'the mandalorian',
    'the last of us', 'wednesday', 'squid game', 'the walking dead', 'the boys', 'house of the dragon'],
};
function isPopular(cat, title) {
  const t = (title || '').toLowerCase();
  return (POPULAR[cat] || []).some(p => t.includes(p));
}
function isHiddenGem(cat, it, rating) { return rating >= 8.5 && !isPopular(cat, it.title); }

// Densest 1.0-wide score band across the ranked list.
function densestRange(L) {
  const n = L.master.length;
  if (n === 0) return null;
  const bins = new Array(9).fill(0); // [1-2),[2-3),...,[9-10]
  L.master.forEach((it, i) => {
    const r = ratingForMasterIndex(L, i);
    let b = Math.floor(r - 1); // r in [1,10] -> 0..9
    if (b > 8) b = 8; if (b < 0) b = 0;
    bins[b]++;
  });
  let best = 0;
  for (let i = 1; i < bins.length; i++) if (bins[i] > bins[best]) best = i;
  return { lo: (best + 1).toFixed(1), hi: (best + 2).toFixed(1), count: bins[best] };
}
function importItems(category, items) {

  for (const it of items) L.unranked.push(it);
  state.tab = 'rank';
  if (!L.current) generateMatchup(L);

// Re-rank a book already in the list: pull it out and run it through rating again.
function rerank(item) {
  const L = cur();
  const i = L.master.indexOf(item);
  if (i === -1) return;
  L.master.splice(i, 1);
  item.elo = undefined;
  item.tier = undefined;
  L.unranked.unshift(item);           // next up
  if (L.current && !L.current.isIntro) L.current = null; // drop a lingering refine so it starts now
  if (!L.current) generateMatchup(L);
  state.tab = 'rank';
  render();
}

  const L = cur();

}
// Already-ranked books by the same author (excluding `item`), newest ranking first, capped.
function authorSiblings(L, item, cap) {
  if (!item || item.kind !== 'books' || !item.author || item.author === 'Unknown author') return [];
  const out = [];
  L.master.forEach((b, i) => {
    if (b !== item && b.author === item.author) out.push({ book: b, rating: ratingForMasterIndex(L, i) });
  });
  return out.slice(0, cap || 6);

/* ---------------------------- covers ------------------------------ */
// Resolve true if the image actually decodes to real pixels (naturalWidth/Height
// are reliable on a detached Image; the old .width/.height read 0 in some engines,
// which was rejecting perfectly good covers and forcing the initials fallback).
function loadImage(url) {
  return new Promise(resolve => {
    if (!url) { resolve(false); return; }
    const im = new Image();
    im.onload = () => resolve((im.naturalWidth || im.width) > 2 && (im.naturalHeight || im.height) > 2);
    im.onerror = () => resolve(false);
    im.src = url;
  });
}
// Step 1 — Open Library by ISBN (default=false => 404 instead of a blank placeholder).
async function coverFromISBN(isbn) {
  if (!isbn) return null;
  const u = `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg?default=false`;
  return (await loadImage(u)) ? u : null;
}
// Step 2 — Open Library Search API by title + author, then load its cover id/ISBN.
async function coverFromOpenLibrary(title, author) {
  try {
    const q = `https://openlibrary.org/search.json?title=${encodeURIComponent(title || '')}` +
              (author ? `&author=${encodeURIComponent(author)}` : '') + `&limit=1`;
    const data = await robustJSON(q, d => Array.isArray(d.docs));
    if (!data) return null;
    const doc = data.docs && data.docs[0];
    if (!doc) return null;
    if (doc.cover_i) {
      const u = `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg?default=false`;
      if (await loadImage(u)) return u;
    }
    if (doc.isbn && doc.isbn[0]) {
      const u2 = `https://covers.openlibrary.org/b/isbn/${cleanISBN(doc.isbn[0])}-L.jpg?default=false`;
      if (await loadImage(u2)) return u2;
    }
    return null;
  } catch (_) { return null; }
}
// Step 3 — Google Books API; force the thumbnail to a secure https URL.
async function coverFromGoogleBooks(title, author) {
  try {
    const term = [title, author].filter(Boolean).join(' ');
    if (!term) return null;
    const q = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(term)}&maxResults=5`;
    const data = await robustJSON(q, d => Array.isArray(d.items) || typeof d.totalItems === 'number');
    if (!data) return null;
    for (const it of (data.items || [])) {
      const links = it.volumeInfo && it.volumeInfo.imageLinks;
      let u = links && (links.thumbnail || links.smallThumbnail);
      if (u) {
        u = u.replace(/^http:\/\//i, 'https://'); // secure URL; avoids mixed-content blocks
        if (await loadImage(u)) return u;
      }
    }
    return null;
  } catch (_) { return null; }
}
// Books only: ISBN -> Open Library search -> Google Books -> null (=> initials).
async function resolveCover(book) {
  if (book.cover) return book.cover;        // cached hit
  if (book.cover === null) return null;     // cached miss (don't hammer the APIs)
  const isbn = cleanISBN(book.isbn);
  let url = await coverFromISBN(isbn);
  if (!url) url = await coverFromOpenLibrary(book.title, book.author);
  if (!url) url = await coverFromGoogleBooks(book.title, book.author);
  book.cover = url; // URL, or null if all three failed
  return url;
}
function showImg(elm, url, alt, fallback) {
  const img = new Image();
  img.alt = alt || '';
  img.onload = () => { elm.innerHTML = ''; elm.appendChild(img); };
  img.onerror = () => { if (fallback && fallback !== url) showImg(elm, fallback, alt); };
  img.src = url;
}
function mountCover(elm, item) {
  elm.innerHTML = placeholderFor(item);
  if (item.kind === 'books') {
    if (item.cover === null) return;
    resolveCover(item).then(url => { if (url) showImg(elm, url, item.title); });
  } else {
    if (item.cover) showImg(elm, item.cover, item.title, item.coverAlt);
  }
}

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function rankScreen() {

// Full-width Top 10 band pinned across the bottom of the rank page (rendered as a wrap-level sibling).
function topTenBar(L) {
  const n = L.master.length;
  if (!n) return '';
  const cards = L.master.slice(0, 10).map((b, i) => {

function mountThumb(elm, item) {
  if (!elm || !item) return;
  if (item.kind === 'books') {
    if (item.cover) { showImg(elm, item.cover, item.title); return; }
    if (item.cover === null) return;
    resolveCover(item).then(url => { if (url) showImg(elm, url, item.title); }).catch(() => {});
  } else if (item.cover) {
    showImg(elm, item.cover, item.title, item.coverAlt);
  }
}

function leaderboardScreen() {
  const L = cur(); const n = L.master.length;
  if (n === 0) return `<div class="fade">${emptyState('No rankings yet', 'Rank a few matchups and your list will fill in here.')}${recCarousel(state.category, L)}</div>`;
  const genreSet = new Set(), authorSet = new Set();
  L.master.forEach(b => { (b.genres || []).forEach(g => genreSet.add(g)); if (b.author) authorSet.add(b.author); });
  const genres = [...genreSet].sort((a, b) => a.localeCompare(b));
  const authors = [...authorSet].sort((a, b) => a.localeCompare(b));
  if (L.filterGenre !== 'all' && !genreSet.has(L.filterGenre)) L.filterGenre = 'all';
  if (L.filterAuthor !== 'all' && !authorSet.has(L.filterAuthor)) L.filterAuthor = 'all';
  const gActive = L.filterGenre !== 'all', aActive = L.filterAuthor !== 'all';
  const segs = (L.segments || []).filter(s => s !== 'all');
  const searchQ = (L.search || '').trim().toLowerCase();
  const anyActive = gActive || aActive || segs.length > 0 || !!searchQ;
  const cat = state.category;

  const segMatch = (seg, x) => {
    if (seg === 'top') return x.rating >= 8.5;
    if (seg === 'solid') return isSolidified(x.b);
    if (seg === 'contested') return isContested(x.b);
    if (seg === 'gem') return isHiddenGem(cat, x.b, x.rating);
    return true;
  };
  const matches = L.master
    .map((b, i) => ({ b, i, rating: ratingForMasterIndex(L, i) }))
    .filter(x =>
      (L.filterGenre === 'all' || (x.b.genres || []).includes(L.filterGenre)) &&
      (L.filterAuthor === 'all' || x.b.author === L.filterAuthor) &&
      (!searchQ || (x.b.title || '').toLowerCase().includes(searchQ)) &&
      (segs.length === 0 || segs.some(seg => segMatch(seg, x)))
    );

  const rows = matches.map(({ b, i, rating }) => {
    const initials = (b.title || '?').trim().slice(0, 2).toUpperCase();
    const top = i === 0 ? ' top' : '';
    return `
    <li class="row${top}" data-rerank="${b.id}" title="Tap to re-rank">
      <div class="rank-num">${i + 1}</div>
      <div class="tile" data-ttcover="${b.id}"><span class="tt-ini">${esc(initials)}</span></div>
      <div class="row-main">
        <h3 class="lb-name">${esc(b.title)}</h3>
        <p class="clamp1">${esc(b.subtitle || '')}</p>
      </div>
      ${ratingBadge(rating)}
      <svg class="rerank-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
    </li>`;
  }).join('') || `<p class="note" style="text-align:left;">No ${esc(CATS[state.category].plural)} match these filters.</p>`;

  // real-time title search + multi-select segment dropdown
  const searchIcon = `<svg class="live-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>`;
  const searchBox = `<div class="livewrap lb-searchwrap">${searchIcon}<input id="lb-search" class="live-input" type="text" autocomplete="off" placeholder="Search this leaderboard…" value="${esc(L.search || '')}" /></div>`;
  const SEG_DEFS = [['all', 'Show All'], ['top', 'Top Tier · 8.5–10.0'], ['solid', 'Solidified'], ['contested', 'Contested'], ['gem', 'Hidden Gems']];
  const segBtn = `<button data-act="segtoggle" class="segbtn${segs.length ? ' on' : ''}">Filters${segs.length ? ` · ${segs.length}` : ''}<i class="caret"></i></button>`;
  const segDrop = L.segOpen ? `<div class="seg-drop">${SEG_DEFS.map(([k, label]) => {
    const on = k === 'all' ? segs.length === 0 : segs.includes(k);
    return `<button class="seg-opt${on ? ' on' : ''}" data-seg="${k}"><span class="seg-check">${on ? '✓' : ''}</span>${label}</button>`;
  }).join('')}</div>` : '';
  const searchRow = `<div class="lbfilter"><div class="lb-searchcell">${searchBox}</div><div class="segwrap">${segBtn}${segDrop}</div></div>`;

  const showGenre = genres.length > 0, showAuthor = authors.length > 1;
  const opt = (v, label, sel) => `<option value="${esc(v)}"${sel ? ' selected' : ''}>${esc(label)}</option>`;
  const genreSel = showGenre ? `
    <div class="select-wrap${gActive ? ' on' : ''}">
      <select class="select" data-filter="genre" aria-label="Filter by genre">
        ${opt('all', 'All genres', !gActive)}${genres.map(g => opt(g, g, L.filterGenre === g)).join('')}
      </select></div>` : '';
  const authorSel = showAuthor ? `
    <div class="select-wrap${aActive ? ' on' : ''}">
      <select class="select" data-filter="author" aria-label="Filter by author">
        ${opt('all', 'All authors', !aActive)}${authors.map(a => opt(a, a, L.filterAuthor === a)).join('')}
      </select></div>` : '';
  const bar = (showGenre || showAuthor) ? `<div class="filters">${genreSel}${authorSel}</div>` : '';
  const avg = matches.length ? (matches.reduce((s, x) => s + x.rating, 0) / matches.length).toFixed(1) : '—';
  const avgTxt = matches.length ? `<span class="rate" style="color:${scoreColor(parseFloat(avg))}">${avg}</span>` : '—';
  const metaRow = anyActive ? `<div class="lb-meta"><span class="filter-count">Showing ${matches.length} of ${n} · avg ${avgTxt}</span><button class="clear-btn" data-act="clearfilter">Clear all</button></div>` : '';

  return `
  <div class="fade">
    <div class="board-head"><h2>Leaderboard</h2><span>${n} ranked · 10.0 → 1.0</span></div>
    ${searchRow}
    ${bar}
    ${metaRow}
    <ol class="board">${rows}</ol>
    ${recCarousel(state.category, L)}
  </div>`;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function genreTokens(list) {
  const t = new Set();
  (list || []).forEach(g => String(g).toLowerCase().split(/[^a-z0-9]+/).forEach(w => { if (w.length > 2) t.add(w); }));
  return t;
}
function normTitle(t) {
  return String(t || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\b(the|a|an)\b/g, ' ').replace(/\s+/g, ' ').trim();
}
// Search normalization keeps articles (so "the office" still matches) — just lowercase alnum.
function snorm(s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim(); }
// Catalog posters are stored as a short Wikimedia path (e.g. "en/d/d6/Poster.jpg").
// Rebuild a resized thumbnail URL for display.
function wikiThumb(suffix, w) {
  if (!suffix) return '';
  const parts = String(suffix).split('/');
  if (parts.length < 4) return 'https://upload.wikimedia.org/wikipedia/' + suffix;
  const ns = parts[0], a = parts[1], b = parts[2], file = parts.slice(3).join('/');
  let name = file; if (/\.svg$/i.test(name)) name += '.png';
  return 'https://upload.wikimedia.org/wikipedia/' + ns + '/thumb/' + a + '/' + b + '/' + file + '/' + (w || 240) + 'px-' + name;
}
function wikiFull(suffix) { return suffix ? 'https://upload.wikimedia.org/wikipedia/' + suffix : ''; }
// Map of movie title -> poster path, for backfilling posters onto items added before v16.
let _posterMap = null;
function posterMapMovies() {
  if (_posterMap) return _posterMap;
  _posterMap = new Map();
  for (const row of (LOCAL_CATALOG.movies || [])) if (row[3]) { const k = snorm(row[0]); if (!_posterMap.has(k)) _posterMap.set(k, row[3]); }
  return _posterMap;
}
function catalogPosterFor(category, title) {
  if (category !== 'movies') return null;
  const p = posterMapMovies().get(snorm(title));
  return p ? { thumb: wikiThumb(p), full: wikiFull(p) } : null;
}
// Instant offline search against the built-in top-titles catalog for each category.
function localSuggest(term, category) {
  const q = snorm(term); if (!q) return [];
  const list = LOCAL_CATALOG[category] || []; const isBooks = category === 'books';
  const starts = [], contains = [];
  for (const row of list) {
    const nt = snorm(row[0]);
    if (nt.startsWith(q)) starts.push(row);
    else if (nt.indexOf(q) >= 0) contains.push(row);
    if (starts.length >= 12) break;
  }
  return [...starts, ...contains].slice(0, 8).map(row => {
    if (isBooks) return { title: row[0], subtitle: row[1], year: row[2], isbn: row[3] || '', genres: [], kind: 'books', local: true };
    const thumb = row[3] ? wikiThumb(row[3]) : '';
    const full = row[3] ? wikiFull(row[3]) : '';
    return { title: row[0], year: row[1], genre: row[2], genres: row[2] ? [row[2]] : [], kind: category, local: true, thumb: thumb || undefined, cover: thumb || undefined, coverFull: full || undefined };
  });
}
function buildRecommendations(cat, L) {
  // Never recommend anything already in the section (ranked, in the pile, or mid-rating).
  const have = new Set([...L.master, ...L.unranked].map(x => normTitle(x.title)));
  if (L.current && L.current.item) have.add(normTitle(L.current.item.title));
  const catalog = (REC_CATALOG[cat] || []).filter(e => !have.has(normTitle(e.title)));
  if (!catalog.length) return [];
  if (!L.master.length) return shuffle(catalog).slice(0, 12); // empty section -> classics

  const seeds = shuffle(L.master).slice(0, 10); // exactly 10 (or all, if fewer)
  const tokenCount = {}, authorCount = {};
  seeds.forEach(s => {
    genreTokens(s.genres).forEach(tok => { tokenCount[tok] = (tokenCount[tok] || 0) + 1; });
    if (s.author) authorCount[s.author] = (authorCount[s.author] || 0) + 1;
  });
  const scored = catalog.map(e => {
    let score = 0;
    genreTokens(e.genres).forEach(tok => { if (tokenCount[tok]) score += tokenCount[tok] * 2; });
    if (e.author && authorCount[e.author]) score += 5;
    score += Math.random() * 1.6; // jitter keeps the row fresh across renders
    return { e, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 12).map(x => x.e);
}

function recCarousel(cat, L) {
  const recs = buildRecommendations(cat, L);
  lastRecs = recs;
  if (!recs.length) return '';
  const cards = recs.map((e, i) => recCard(e, i, cat)).join('');
  return `
  <div class="rec">
    <div class="rec-head"><h3>Forgot to Rank?</h3><span>Suggested for you</span></div>
    <p class="rec-sublede">${L.master.length ? 'Fresh picks from the genres you rank most — scroll →' : 'Popular picks to get you started — scroll →'}</p>
    <div class="rec-row">${cards}</div>
  </div>`;
}
function recCard(e, i, cat) {
  const sub = cat === 'books' ? esc(e.author || '') : (e.genres && e.genres[0] ? esc(e.genres[0]) : '');
  const ph = placeholderFor({ kind: cat, title: e.title, year: '' });
  return `
  <div class="rec-card" data-recidx="${i}">
    <div class="rec-cover" data-reccover="${i}">${ph}</div>
    <div class="rec-info">
      <p class="rec-title clamp2">${esc(e.title)}</p>
      ${sub ? `<p class="rec-sub clamp1">${sub}</p>` : ''}
    </div>
    <button class="rec-add" data-recadd="${i}" aria-label="Add ${esc(e.title)} to pile">+ Add to Pile</button>
  </div>`;
}
function mountRecCover(cell, e, cat) {
  if (cat === 'books') {
    const b = { kind: 'books', isbn: e.isbn, title: e.title, author: e.author, cover: undefined };
    resolveCover(b).then(url => { if (url) showImg(cell, url, e.title); }).catch(() => {});
  } else {
    lookupMedia(e.title, cat).then(d => { if (d && d.cover) showImg(cell, d.cover, e.title); }).catch(() => {});
  }
}
function addRecommendation(idx, btn) {
  const cat = state.category, L = cur();
  const e = lastRecs[idx];
  if (!e) return;
  let item;
  if (cat === 'books') item = makeBook(e.title, e.author || '', e.isbn || '', e.genres || []);
  else { item = makeMedia(e.title, '', null, cat); item.genres = e.genres || []; }
  L.unranked.push(item);
  if (cat !== 'books') enrichItem(item, cat); // fetch poster/year in the background
  if (!L.current) generateMatchup(L);
  save();
  updatePileBadge();
  const card = btn.closest('.rec-card');
  if (card) {
    card.classList.add('leaving');
    let removed = false;
    const kill = () => { if (!removed && card.parentNode) { removed = true; card.parentNode.removeChild(card); } };
    card.addEventListener('transitionend', kill, { once: true });
    setTimeout(kill, 420);
  }
}
function updatePileBadge() {
  const L = cur();
  const rankTab = document.querySelector('[data-tab="rank"]');
  if (!rankTab) return;
  let b = rankTab.querySelector('.cnt');
  const v = L.unranked.length;
  if (v > 0) {
    if (!b) { b = document.createElement('span'); b.className = 'cnt'; rankTab.insertBefore(b, rankTab.querySelector('.lab')); }
    b.textContent = v > 99 ? '99+' : v;
  } else if (b) { b.remove(); }
}

/* ======================== live search (movies/tv) ================= */
let searchTimer = null, searchSeq = 0;

function liveSearchBlock(cat) {
  const ph = cat === 'books' ? 'Search books… e.g. Dune'
    : cat === 'movies' ? 'Search movies… e.g. Interstellar' : 'Search TV shows… e.g. Severance';
  const ic = `<svg class="live-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>`;
  return `
  <div class="livewrap">
    <p class="live-label">Live search — tap a result to add</p>
    ${ic}
    <input id="live-search" class="live-input" type="text" autocomplete="off" autocapitalize="words" placeholder="${ph}" />
    <div id="live-drop" class="live-drop"></div>
  </div>`;
}
function filmMini() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h18v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8Z"/><path d="M3 8l2.1-3.4 3.4.8"/><path d="M9.4 5.4l3.4.8"/></svg>`;
}
function sugRow(r, i) {
  const thumb = r.thumb
    ? `<img class="sug-thumb" src="${esc(r.thumb)}" alt="" />`
    : `<div class="sug-ph">${filmMini()}</div>`;
  const sub = r.subtitle ? `${esc(r.subtitle)}${r.year ? ' · ' + esc(String(r.year)) : ''}` : esc(String(r.year || '—'));
  return `
  <div class="sug" data-i="${i}">
    ${thumb}
    <div class="sug-main"><b class="clamp1">${esc(r.title)}</b><span>${sub}</span></div>
    <div class="sug-plus">+</div>
  </div>`;
}
function renderSuggestions(list) {
  const drop = el('live-drop'); if (!drop) return;
  drop.innerHTML = list.map((r, i) => sugRow(r, i)).join('');
  drop.classList.add('open');
  drop.querySelectorAll('.sug').forEach(node => {
    node.addEventListener('mousedown', e => e.preventDefault());
    node.onclick = () => pickSuggestion(list[+node.getAttribute('data-i')]);
  });
}
async function runLiveSearch(q) {
  const cat = state.category;
  const seq = ++searchSeq;
  const local = localSuggest(q, cat);        // instant, offline
  if (local.length) renderSuggestions(local);
  else { const d = el('live-drop'); if (d) { d.innerHTML = `<div class="sug-empty">Searching…</div>`; d.classList.add('open'); } }
  // supplement with the online catalog for movies/TV (adds posters + titles not in the built-in list)
  let api = [];
  if (cat !== 'books') { try { api = await itunesSuggest(q, cat, 8); } catch (_) {} }
  if (seq !== searchSeq) return;
  const seen = new Set(local.map(r => snorm(r.title)));
  const merged = [...local];
  for (const r of api) { const k = snorm(r.title); if (!seen.has(k)) { seen.add(k); merged.push(r); } }
  if (!merged.length) {
    const d = el('live-drop'); if (d) { d.innerHTML = `<div class="sug-empty">No matches — try a shorter or more exact title, or add it manually below.</div>`; d.classList.add('open'); }
    return;
  }
  renderSuggestions(merged.slice(0, 10));
}
function pickSuggestion(r) {
  if (!r) return;
  const cat = state.category, L = cur();
  let item;
  if (cat === 'books' || r.kind === 'books') {
    item = makeBook(r.title, r.subtitle || '', null, r.genres || []);
    if (r.isbn) item.isbn = r.isbn;
  } else {
    item = makeMedia(r.title, r.year, r.cover || null, cat);
    item.genres = r.genres || [];
    if (r.coverFull) item.coverAlt = r.coverFull;
    if (!item.cover) enrichItem(item); // try to backfill a poster in the background
  }
  L.unranked.push(item);
  state.tab = 'library'; state.addOpen = false;
  if (!L.current) generateMatchup(L);
  render();
  const ls = el('live-search'); if (ls) { ls.value = ''; ls.focus(); }
}

function openAdd() { state.addOpen = true; render(); const t = el('add-title'); if (t) t.focus(); }

function submitManualItem() {
  const cat = state.category, L = cur();
  const title = (el('add-title') ? el('add-title').value : '').trim();
  const errEl = el('add-error');
  if (!title) { if (errEl) errEl.textContent = 'Add a title to continue.'; return; }
  if (cat === 'books') {
    const author = (el('add-author') ? el('add-author').value : '').trim();
    const isbn = cleanISBN(el('add-isbn') ? el('add-isbn').value : '');
    const genres = genresFromInput(el('add-genre') ? el('add-genre').value : '');
    L.unranked.push(makeBook(title, author, isbn, genres));
  } else {
    const year = (el('add-year') ? el('add-year').value : '').trim();
    const genres = genresFromInput(el('add-genre') ? el('add-genre').value : '');

  if (!L.current) generateMatchup(L);
